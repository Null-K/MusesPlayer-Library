name: Build Runtime Libraries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Moving GitHub Release tag to update
        default: runtime-latest
        required: true
        type: string
      vlc_version:
        description: VLC desktop release version, or latest-3
        default: latest-3
        required: true
        type: string
      overwrite:
        description: Upload assets with --clobber
        default: true
        required: true
        type: boolean
  schedule:
    - cron: "27 3 * * 0"

permissions:
  contents: write

concurrency:
  group: runtime-libraries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      vlc_version: ${{ steps.resolve.outputs.vlc_version }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        name: Resolve release versions
        env:
          VLC_VERSION_INPUT: ${{ github.event.inputs.vlc_version || 'latest-3' }}
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag || 'runtime-latest' }}
        run: |
          bash scripts/ci/resolve-versions.sh
          echo "release_tag=$RELEASE_TAG_INPUT" >> "$GITHUB_OUTPUT"

  libvlc-windows:
    needs: resolve
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Install extraction tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends p7zip-full zip
      - name: Package VLC Windows runtime
        env:
          TARGET_OS: windows
          TARGET_ARCH: ${{ matrix.arch }}
          VLC_VERSION: ${{ needs.resolve.outputs.vlc_version }}
        run: bash scripts/ci/package-vlc-release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: libvlc-windows-${{ matrix.arch }}
          path: dist/*.zip

  libvlc-linux:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Package VLC Linux runtime from Flathub stable
        env:
          TARGET_OS: linux
          TARGET_ARCH: ${{ matrix.arch }}
          VLC_VERSION: ${{ needs.resolve.outputs.vlc_version }}
        run: bash scripts/ci/build-vlc-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: libvlc-linux-${{ matrix.arch }}
          path: dist/*.zip

  publish:
    needs:
      - resolve
      - libvlc-windows
      - libvlc-linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
          ASSET_DIR: release-assets
          OVERWRITE: ${{ inputs.overwrite }}
        run: bash scripts/ci/publish-release.sh
